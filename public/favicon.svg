<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0018"/>
      <stop offset="100%" stop-color="#050812"/>
    </linearGradient>
    <linearGradient id="rg" x1="18" y1="12" x2="72" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="gl" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Dark rounded-square background (like a native app icon) -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle ambient glow behind the R -->
  <ellipse cx="50" cy="44" rx="32" ry="28" fill="#7c3aed" opacity="0.22" filter="url(#bgl)"/>

  <!-- Bold geometric R — electric cyan → violet → rose gradient with glow -->
  <path fill-rule="evenodd" fill="url(#rg)" filter="url(#gl)"
    d="M 18,12 H 62 A 23,20 0 0,1 62,52 L 80,88 H 60 L 36,52 V 88 H 18 Z
       M 36,22 H 57 A 14,10 0 0,1 57,42 H 36 Z"/>
</svg>
